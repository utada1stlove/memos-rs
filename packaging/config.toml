[server]
host = "127.0.0.1"
port = 5230

[logging]
level = "info"

[database]
kind = "sqlite"
url = "sqlite:///var/lib/memos-rs/data/memos-rs.db"
max_connections = 5

[auth]
# Set this before the first production start.
jwt_secret = ""
jwt_issuer = "memos-rs"
token_ttl_seconds = 86400

[frontend]
static_dir = "/var/lib/memos-rs/frontend/dist"
